name: Quality CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RUNTIME_AUDIT_DATABASE_URL: ${{ secrets.RUNTIME_AUDIT_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install pnpm
        run: corepack prepare pnpm@10.18.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check public secret exposure
        run: pnpm run lint:exposure

      - name: Build engine catalog
        run: pnpm run engine:catalog

      - name: Check model roster drift
        run: pnpm run model:generate

      - name: Audit model datasets
        run: pnpm run models:audit

      - name: Audit runtime overrides (non-blocking)
        if: ${{ env.RUNTIME_AUDIT_DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ env.RUNTIME_AUDIT_DATABASE_URL }}
        run: pnpm run models:audit -- --runtime
        continue-on-error: true

      - name: Check sources quality (warn-only)
        run: pnpm run sources:check
        continue-on-error: true

      - name: Type check (frontend)
        run: pnpm --dir frontend exec tsc --noEmit

      - name: Lint (frontend)
        run: pnpm --dir frontend run lint

      - name: Alt quality check (frontend)
        run: pnpm --dir frontend run qa:image-alt

      - name: Validate tests
        run: pnpm run test:validate

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test admin
        env:
          DATABASE_URL: ${{ env.RUNTIME_AUDIT_DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: pnpm run test:admin-smoke

      - name: Upload Playwright admin report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-admin-report
          path: output/playwright/**
